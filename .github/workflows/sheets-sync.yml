name: Sheets CSV -> JSON

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Anno (es. 2026)"
        required: true
        default: "2026"
  push:
    paths:
      - "data/csv/**"
      - "scripts/sheets_sync/**"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          # Non eseguire `bundle install`: il validator usa solo stdlib; il Gemfile Jekyll qui romperebbe/sprecerebbe tempo.
          bundler: none

      - name: Import CSV -> JSON
        env:
          # workflow_dispatch: github.event.inputs.year; push: vuoto → default 2026
          INPUT_YEAR: ${{ github.event.inputs.year }}
        run: |
          YEAR="${INPUT_YEAR:-2026}"
          echo "Using year=$YEAR"
          python3 scripts/sheets_sync/import_csv_to_json.py "$YEAR"

      - name: Validate stagione-regolare data
        env:
          INPUT_YEAR: ${{ github.event.inputs.year }}
        run: |
          YEAR="${INPUT_YEAR:-2026}"
          ruby scripts/validate_stagione_regolare.rb "$YEAR"

      # Se nel frattempo qualcuno ha pushato su main (o altro run in parallelo), senza rebase il push del commit JSON fallisce (non-fast-forward).
      - name: Rebase su branch remoto (auto-stash modifiche JSON)
        run: |
          git config rebase.autoStash true
          git fetch origin "${{ github.ref_name }}"
          git rebase "origin/${{ github.ref_name }}"

      - name: Git diff (debug)
        run: git status && git diff --stat

      - name: Commit generated JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): sync JSON from Sheets CSV"
          file_pattern: "assets/data/stagione-regolare/**"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"

