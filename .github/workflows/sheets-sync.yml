name: Sheets CSV -> JSON

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Anno (es. 2026)"
        required: true
        default: "2026"
  push:
    paths:
      - "data/csv/**"
      - "scripts/sheets_sync/**"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Storia completa: evita rebase/push incoerenti con clone shallow (fetch-depth: 1 di default).
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          # Non eseguire `bundle install`: il validator usa solo stdlib; il Gemfile Jekyll qui romperebbe/sprecerebbe tempo.
          bundler: none

      - name: Import CSV -> JSON
        env:
          # workflow_dispatch: github.event.inputs.year; push: vuoto → default 2026
          INPUT_YEAR: ${{ github.event.inputs.year }}
        run: |
          YEAR="${INPUT_YEAR:-2026}"
          echo "Using year=$YEAR"
          python3 scripts/sheets_sync/import_csv_to_json.py "$YEAR"

      - name: Validate stagione-regolare data
        env:
          INPUT_YEAR: ${{ github.event.inputs.year }}
        run: |
          YEAR="${INPUT_YEAR:-2026}"
          ruby scripts/validate_stagione_regolare.rb "$YEAR"

      - name: Verifica allineamento CSV → JSON (stesso algoritmo dell’import)
        env:
          INPUT_YEAR: ${{ github.event.inputs.year }}
        run: |
          YEAR="${INPUT_YEAR:-2026}"
          python3 scripts/sheets_sync/check_csv_json_sync.py "$YEAR"

      # Se nel frattempo qualcuno ha pushato su main (o altro run in parallelo), senza rebase il push del commit JSON fallisce (non-fast-forward).
      - name: Rebase su branch remoto (auto-stash modifiche JSON)
        run: |
          git config rebase.autoStash true
          git fetch origin "${{ github.ref_name }}"
          git rebase "origin/${{ github.ref_name }}"

      - name: Git diff (debug)
        run: git status && git diff --stat

      # git-auto-commit-action non fa pull prima del push: se main si muove (force-push,
      # altro commit, due run in parallelo) il push fallisce (non-fast-forward).
      - name: Commit and push generated JSON
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "assets/data/stagione-regolare/"
          if git diff --cached --quiet; then
            echo "No JSON changes; skipping commit."
            exit 0
          fi
          git commit -m "chore(data): sync JSON from Sheets CSV"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "${GITHUB_REF_NAME}"

