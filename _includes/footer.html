<footer class="site-footer h-card">
  <div class="wrapper">
    <div class="footer-col-wrapper">

      <div class="footer-col footer-col--info">
        <p>&copy; {{ site.time | date: '%Y' }} {{ site.title | escape }} — {{ site.description | escape }}</p>
        <a class="footer-link" href="{{ '/contatti/' | relative_url }}">Contatti</a>
      </div>

      <div class="sponsor">
        <p class="sponsor-credits">Powered by <a href="https://www.tactic.it" target="_blank" rel="noopener">Tactic</a></p>
        <div class="sponsor-logos">
          {%- include tactic-logo.svg -%}
          {%- include molkky-logo.svg -%}
        </div>
      </div>

      <div class="footer-col footer-col--social">
        {%- include social.html -%}
      </div>

    </div>
  </div>
</footer>
