---
layout: default
---
<div class="main-content">
    <main class="page-content" aria-label="Content">
        <div class="wrapper archive-wrapper" data-layout="archive">
            <header class="post-header">
                <h1 class="post-title centered-tite">{{ page.title | escape }}</h1>
            </header>
            {% for post in site.posts %}
              <article class="archive-entry" data-archive-entry>
                <header class="post-header">
                  <h3 class="post-title centered-tite">{{ post.title | escape }}</h3>
                </header>

                {% if post.video %}
                  <div class="rwd-video">
                    <iframe width="560" height="315" src="{{ post.video }}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                  </div>
                {% endif %}

                <div class="archive-entry-content js-archive-gallery">
                  {{ post.content }}
                </div>
              </article>
            {% endfor %}
           
        </div>
    </main>
</div>

<script src="{{ '/assets/js/archive-gallery.js' | relative_url }}"></script>
