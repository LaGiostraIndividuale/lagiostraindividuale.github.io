steps:
  - num: "01"
    title: "Stagione Regolare"
    body: "Dal 20 Marzo al 31 Luglio, in conferenze locali. Ogni giocante sfida tuttǝ lǝ altrǝ uno contro uno. Lǝ prime due classificatǝ accedono direttamente al Torneo Finale."
  - num: "02"
    title: "Ripescaggio"
    body: "Lǝ terzǝ classificatǝ di ogni conferenza si gioca l'accesso al Torneo in una giornata dedicata, il 19 Settembre a Pesaro. Solo unǝ giocante viene ripescatǝ."
  - num: "03"
    title: "Torneo Finale"
    body: "Quattro gironi casuali, semifinali e finale alla meglio di cinque set. Lǝ vincitorǝ diventa Campionǝ de La Giostra Individuale 2026."
